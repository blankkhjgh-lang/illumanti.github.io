<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>My Links</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #000000;
    }

    body {
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      padding: 0 15px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .card {
      background: #050505;
      border: 1px solid rgba(0, 255, 255, 0.45);
      border-radius: 14px;
      overflow: hidden;

      box-shadow:
        0 0 8px rgba(0, 255, 255, 0.12),
        inset 0 0 15px rgba(0, 255, 255, 0.03);

      transition: 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(0, 255, 255, 0.9);

      box-shadow:
        0 0 18px rgba(0, 255, 255, 0.3),
        inset 0 0 20px rgba(0, 255, 255, 0.06);
    }

    .image-area {
      height: 110px;
      margin: 6px;
      border-radius: 10px;

      display: flex;
      align-items: center;
      justify-content: center;

      position: relative;

      background:
        radial-gradient(
          circle,
          rgba(0, 255, 255, 0.12),
          rgba(0, 0, 0, 0.8) 65%,
          #000000
        );
    }

    .link-icon {
      width: 55px;
      height: 55px;

      border-radius: 50%;

      display: flex;
      align-items: center;
      justify-content: center;

      font-size: 23px;

      background: #000000;
      color: #00ffff;

      border: 2px solid #00ffff;

      box-shadow:
        0 0 12px rgba(0, 255, 255, 0.4);

      font-weight: 900;
    }

    .hot {
      position: absolute;
      top: 6px;
      left: 6px;

      padding: 4px 9px;

      border-radius: 15px;

      background: #00ffff;
      color: #000000;

      font-size: 9px;
      font-weight: 900;

      box-shadow:
        0 0 10px rgba(0, 255, 255, 0.5);
    }

    .info {
      text-align: center;
      padding: 0 8px 9px;
    }

    .title {
      font-size: 14px;
      font-weight: 800;
      color: #ffffff;
      margin-bottom: 4px;
    }

    .url {
      font-size: 8px;
      color: #6f9999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 8px;
    }

    .buttons {
      border-top: 1px solid rgba(0, 255, 255, 0.2);
      padding-top: 7px;
    }

    .favorite {
      width: 100%;
      padding: 7px;

      border-radius: 15px;

      background: #080808;
      border: 1px solid rgba(0, 255, 255, 0.35);

      color: #ffffff;
      font-size: 9px;
      font-weight: 700;

      cursor: pointer;
      margin-bottom: 6px;

      transition: 0.2s;
    }

    .favorite:hover {
      background: rgba(0, 255, 255, 0.1);
      border-color: #00ffff;
    }

    .view-more {
      display: block;
      width: 100%;

      padding: 7px;

      border-radius: 15px;

      background: #00ffff;
      color: #000000;

      border: 1px solid #00ffff;

      font-size: 10px;
      font-weight: 900;

      text-decoration: none;

      transition: 0.2s;
    }

    .view-more:hover {
      background: #000000;
      color: #00ffff;
      box-shadow: 0 0 12px rgba(0, 255, 255, 0.4);
    }

    .heart {
      font-size: 12px;
      vertical-align: middle;
      margin-right: 3px;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .image-area {
        height: 100px;
      }
    }

    @media (max-width: 400px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .image-area {
        height: 90px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="grid">

      <!-- LINK 1 -->
      <div class="card">
        <div class="image-area">
          <div class="hot">HOT</div>
          <div class="link-icon">1</div>
        </div>

        <div class="info">
          <div class="title">Link 1</div>
          <div class="url">https://vvid.pages.dev</div>

          <div class="buttons">
            <button class="favorite" onclick="toggleFavorite(this)">
              <span class="heart">♡</span>
              Add to favorites
            </button>

            <a
              class="view-more"
              href="https://vvid.pages.dev"
              target="_blank"
              rel="noopener noreferrer"
            >
              View more
            </a>
          </div>
        </div>
      </div>

      <!-- LINK 2 -->
      <div class="card">

        </div>

        <div class="info">

          <div class="buttons">

            </button>

            <a

            >

            </a>
          </div>
        </div>
      </div>

      <!-- LINK 3 -->
      <div class="card">
        <div class="image-area">
          <div class="link-icon">3</div>
        </div>

        <div class="info">
          <div class="title">Link 3</div>
          <div class="url">https://repskingdom.com/products/</div>

          <div class="buttons">
            <button class="favorite" onclick="toggleFavorite(this)">
              <span class="heart">♡</span>
              Add to favorites
            </button>

            <a
              class="view-more"
              href="https://repskingdom.com/products/"
              target="_blank"
              rel="noopener noreferrer"
            >
              View more
            </a>
          </div>
        </div>
      </div>

      <!-- LINK 4 -->
      <div class="card">
        <div class="image-area">
          <div class="hot">HOT</div>

        </div>

        <div class="info">
          <div class="title">Link 4</div>
          <div class="url">https://ventrix.to/</div>

          <div class="buttons">
            <button class="favorite" onclick="toggleFavorite(this)">
              <span class="heart">♡</span>
              Add to favorites
            </button>

            <a
              class="view-more"

              target="_blank"
              rel="noopener noreferrer"
            >

            </a>
          </div>
        </div>
      </div>

      <!-- LINK 5 -->
      <div class="card">
        <div class="image-area">
          <div class="link-icon">5</div>
        </div>

        <div class="info">
          <div class="title">Link 5</div>
          <div class="url">https://vortiga-shop.to/store/cards/hq</div>

          <div class="buttons">
            <button class="favorite" onclick="toggleFavorite(this)">
              <span class="heart">♡</span>
              Add to favorites
            </button>

            <a
              class="view-more"
              href="https://vortiga-shop.to/store/cards/hq"
              target="_blank"
              rel="noopener noreferrer"
            >
              View more
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    function toggleFavorite(button) {
      const heart = button.querySelector(".heart");

      if (heart.textContent === "♡") {
        heart.textContent = "♥";
        button.style.background = "rgba(0, 255, 255, 0.15)";
        button.style.borderColor = "#00ffff";
        button.style.color = "#00ffff";
      } else {
        heart.textContent = "♡";
        button.style.background = "#080808";
        button.style.borderColor = "rgba(0, 255, 255, 0.35)";
        button.style.color = "#ffffff";
      }
    }
  </script>

</body>
</html>
