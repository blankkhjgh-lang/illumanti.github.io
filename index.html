<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>

    <!-- STEP 1: Iconify Script Integration -->
    <script src="https://iconify.design"></script>

    <!-- Basic styling to create a clean, dark layout -->
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 24px;
        }

        /* Search Bar Wrapper Styling */
        .search-container {
            display: flex;
            align-items: center;
            background-color: #1f2833;
            border: 1px solid #45a29e;
            border-radius: 25px;
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        .search-container input {
            background: none;
            border: none;
            color: white;
            outline: none;
            margin-left: 10px;
            width: 100%;
            font-size: 16px;
        }

        /* Action Button Styling */
        .fav-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: #c5a059;
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>

        <!-- Example 1: Search Bar with Iconify Search Icon -->
        <div class="search-container">
            <iconify-icon icon="lucide:search" style="font-size: 20px; color: #45a29e;"></iconify-icon>
            <input type="text" placeholder="Search products...">
        </div>

        <!-- Example 2: Interactive Button with Iconify Heart Icon -->
        <button class="fav-button">
            <iconify-icon icon="lucide:heart" style="font-size: 20px;"></iconify-icon>
            Add to favorites
        </button>
    </div>

</body>
</html>
