<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILLUMINATI MOVIES</title>

    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #0b0101;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            width: 100%;
            padding: 30px 20px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #1a0000, transparent);
        }

        h1 {
            font-size: 32px;
            margin: 0 0 25px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px #ff4d6d;
        }

        /* NAV & SEARCH same as before */
        .nav-container, .search-container {
            margin-bottom: 25px;
        }

        /* PRODUCT GRID - 2 per row */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 18px;
            padding: 0 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .product-card {
            background: #120505;
            border: 1px solid #3a0d0d;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.1);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(255, 77, 109, 0.25);
            border-color: #ff4d6d;
        }

        .product-images {
            position: relative;
            height: 260px;
            background: #1a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .product-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(90deg, #ff4d6d, #ff758f);
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 5px 14px;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .product-info {
            padding: 16px;
            text-align: center;
        }

        .product-title {
            font-size: 15px;
            font-weight: 600;
            margin: 0 0 6px;
            line-height: 1.3;
        }

        .product-subtitle {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 12px;
        }

        .price {
            font-size: 18px;
            font-weight: 700;
            color: #ff4d6d;
            margin-bottom: 14px;
        }

        .btn-fav {
            background: #1c0b0b;
            border: 1px solid #3a1515;
            color: #ddd;
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-view {
            background: white;
            color: black;
            width: 100%;
            padding: 11px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
        }

        /* REPS SECTION */
        #reps-section {
            display: none;
        }

        .empty-message {
            background: #120505;
            border: 1px solid #3a0d0d;
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            color: #888;
            margin: 20px;
        }

        @media (max-width: 500px) {
            .grid-container {
                grid-template-columns: 1fr;
                padding: 0 15px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>ILLUMINATI MOVIES</h1>
        <!-- Keep your existing nav + search here if you want -->
    </div>

    <div class="content">

        <!-- MOVIES -->
        <section id="movies-section">

            <div class="grid-container">

                <!-- A Bug's Life -->
                <div class="product-card">
                    <div class="product-images">
                        <img class="product-image" src="https://upload.wikimedia.org/wikipedia/en/7/7f/A_Bug%27s_Life.jpg" alt="A Bug's Life">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">A Bug's Life</h3>
                        <p class="product-subtitle">Pixar Animation • 1998</p>
                        <div class="price">$9.99</div>
                        
                        <button class="btn-fav">
                            <iconify-icon icon="lucide:heart"></iconify-icon>
                            Add to favorites
                        </button>
                        <a class="btn-view" href="https://drive.google.com/file/d/1AIq4OqiMWiY9zZSayF5VID7pfTwSH6BM/view" target="_blank">
                            View more
                        </a>
                    </div>
                </div>

                <!-- Charlie Brown -->
                <div class="product-card">
                    <div class="product-images">
                        <span class="badge">HOT</span>
                        <img class="product-image" src="https://upload.wikimedia.org/wikipedia/en/1/1f/A_Charlie_Brown_Christmas_poster.jpg" alt="Charlie Brown">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">A Charlie Brown Christmas</h3>
                        <p class="product-subtitle">Classic • 1965</p>
                        <div class="price">$8.49</div>
                        
                        <button class="btn-fav">
                            <iconify-icon icon="lucide:heart"></iconify-icon>
                            Add to favorites
                        </button>
                        <a class="btn-view" href="https://drive.google.com/file/d/1e2UIrJdsz_0k5tp2v0EnPZiPv2ZQSTzg/view" target="_blank">
                            View more
                        </a>
                    </div>
                </div>

                <!-- A Goofy Movie -->
                <div class="product-card">
                    <div class="product-images">
                        <img class="product-image" src="https://upload.wikimedia.org/wikipedia/en/4/4f/A_Goofy_Movie_poster.jpg" alt="A Goofy Movie">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">A Goofy Movie</h3>
                        <p class="product-subtitle">Disney • 1995</p>
                        <div class="price">$10.99</div>
                        
                        <button class="btn-fav">
                            <iconify-icon icon="lucide:heart"></iconify-icon>
                            Add to favorites
                        </button>
                        <a class="btn-view" href="https://drive.google.com/file/d/1ify_EMaQW-ZAn2FOSTztn2AGU-jE7aHL/view" target="_blank">
                            View more
                        </a>
                    </div>
                </div>

                <!-- Ant-Man -->
                <div class="product-card">
                    <div class="product-images">
                        <span class="badge">HOT</span>
                        <img class="product-image" src="https://upload.wikimedia.org/wikipedia/en/0/0c/Ant-Man_and_the_Wasp_Quantumania_poster.jpg" alt="Ant-Man">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">Ant-Man and the Wasp: Quantumania</h3>
                        <p class="product-subtitle">Marvel • 2023</p>
                        <div class="price">$12.99</div>
                        
                        <button class="btn-fav">
                            <iconify-icon icon="lucide:heart"></iconify-icon>
                            Add to favorites
                        </button>
                        <a class="btn-view" href="https://drive.google.com/file/d/1AW3Zm8256tzZ-37lmgYmlGse4knu8dA/view" target="_blank">
                            View more
                        </a>
                    </div>
                </div>

            </div>
        </section>

    </div>

    <!-- Keep your existing script -->
    <script>
        // ... (your previous script for dropdowns, search, etc.)
    </script>
</body>
</html>
