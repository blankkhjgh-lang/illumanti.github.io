<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CYBER VAULT | Login</title>

<script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

<style>

* {
    box-sizing: border-box;
}

:root {
    --cyan: #00e5ff;
    --blue: #009dff;
    --dark: #020608;
    --text: #e8fcff;
    --muted: #64818a;
}

html,
body {
    margin: 0;
    width: 100%;
    min-height: 100%;
}

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;

    color: white;

    font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Arial,
        sans-serif;

    background:
        radial-gradient(
            circle at 50% 0%,
            rgba(0,229,255,0.15),
            transparent 35%
        ),
        radial-gradient(
            circle at 0% 100%,
            rgba(0,150,255,0.08),
            transparent 35%
        ),
        #020608;

    overflow: hidden;
}


/* CUSTOM BACKGROUND */

#backgroundOverlay {
    position: fixed;
    inset: 0;
    z-index: -10;

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    opacity: 0;

    transition: opacity 0.5s ease;
}

#backgroundOverlay.active {
    opacity: 0.28;
}

#backgroundDark {
    position: fixed;
    inset: 0;
    z-index: -9;

    background:
        linear-gradient(
            rgba(1,5,8,0.84),
            rgba(1,5,8,0.95)
        );
}


/* CYBER GRID */

body::before {
    content: "";

    position: fixed;
    inset: 0;

    background-image:
        linear-gradient(
            rgba(0,229,255,0.09) 1px,
            transparent 1px
        ),
        linear-gradient(
            90deg,
            rgba(0,229,255,0.09) 1px,
            transparent 1px
        );

    background-size: 45px 45px;

    opacity: 0.35;

    mask-image:
        linear-gradient(
            to bottom,
            black,
            transparent 90%
        );

    pointer-events: none;

    z-index: -8;
}


/* GLOW */

.glow {
    position: fixed;

    width: 350px;
    height: 350px;

    border-radius: 50%;

    filter: blur(90px);

    pointer-events: none;

    z-index: -7;
}

.glow.one {
    top: -200px;
    left: -150px;

    background:
        rgba(0,229,255,0.09);
}

.glow.two {
    bottom: -200px;
    right: -150px;

    background:
        rgba(0,130,255,0.08);
}


/* MAIN */

.login-wrapper {
    width: 100%;
    max-width: 430px;
}


/* BRAND */

.brand {
    text-align: center;

    margin-bottom: 25px;
}

.logo {
    width: 70px;
    height: 70px;

    display: flex;

    align-items: center;
    justify-content: center;

    margin: 0 auto 15px;

    border-radius: 22px;

    color: var(--cyan);

    background:
        linear-gradient(
            145deg,
            rgba(0,229,255,0.12),
            rgba(0,80,120,0.05)
        );

    border:
        1px solid
        rgba(0,229,255,0.3);

    box-shadow:
        0 0 35px
        rgba(0,229,255,0.12),

        inset 0 0 25px
        rgba(0,229,255,0.04);
}

.logo iconify-icon {
    font-size: 38px;
}

.brand h1 {
    margin: 0;

    font-size: 29px;

    font-weight: 900;

    letter-spacing: 4px;

    background:
        linear-gradient(
            90deg,
            white,
            var(--cyan)
        );

    -webkit-background-clip: text;

    -webkit-text-fill-color: transparent;
}

.brand p {
    margin: 9px 0 0;

    color: var(--muted);

    font-size: 10px;

    letter-spacing: 3px;

    text-transform: uppercase;
}


/* LOGIN CARD */

.login-card {
    position: relative;

    padding: 30px;

    border-radius: 24px;

    background:
        linear-gradient(
            145deg,
            rgba(5,18,24,0.94),
            rgba(2,8,11,0.96)
        );

    border:
        1px solid
        rgba(0,229,255,0.18);

    box-shadow:
        0 30px 80px
        rgba(0,0,0,0.65),

        0 0 45px
        rgba(0,229,255,0.04);

    backdrop-filter: blur(20px);
}


/* TOP LINE */

.login-card::before {
    content: "";

    position: absolute;

    top: 0;
    left: 15%;

    width: 70%;
    height: 1px;

    background:
        linear-gradient(
            90deg,
            transparent,
            var(--cyan),
            transparent
        );

    box-shadow:
        0 0 15px
        var(--cyan);
}


/* HEADER */

.card-header {
    text-align: center;

    margin-bottom: 25px;
}

.card-header h2 {
    margin: 0 0 7px;

    font-size: 21px;

    color: var(--text);
}

.card-header p {
    margin: 0;

    color: var(--muted);

    font-size: 12px;
}


/* STATUS MESSAGE */

.status {
    display: none;

    padding: 10px;

    margin-bottom: 15px;

    border-radius: 9px;

    text-align: center;

    font-size: 11px;

    color: #ff8585;

    background:
        rgba(255,50,50,0.06);

    border:
        1px solid
        rgba(255,50,50,0.15);
}


/* INPUT */

.input-group {
    margin-bottom: 17px;
}

.input-label {
    display: block;

    margin-bottom: 7px;

    color: #8caab2;

    font-size: 10px;

    font-weight: 700;

    letter-spacing: 1px;

    text-transform: uppercase;
}

.input-wrapper {
    position: relative;

    display: flex;

    align-items: center;
}

.input-icon {
    position: absolute;

    left: 14px;

    color: #54727b;

    font-size: 18px;

    pointer-events: none;

    transition: 0.25s ease;
}

.input-wrapper:focus-within
.input-icon {
    color: var(--cyan);
}

.input-wrapper input {
    width: 100%;

    height: 48px;

    padding:
        0 45px
        0 43px;

    border-radius: 12px;

    outline: none;

    color: white;

    background:
        rgba(0,229,255,0.025);

    border:
        1px solid
        rgba(0,229,255,0.13);

    font-size: 14px;

    transition: 0.25s ease;
}

.input-wrapper input::placeholder {
    color: #405b63;
}

.input-wrapper input:focus {
    border-color: var(--cyan);

    background:
        rgba(0,229,255,0.045);

    box-shadow:
        0 0 20px
        rgba(0,229,255,0.08);
}


/* PASSWORD EYE */

.password-toggle {
    position: absolute;

    right: 13px;

    display: flex;

    align-items: center;
    justify-content: center;

    border: none;

    background: transparent;

    color: #54727b;

    cursor: pointer;

    font-size: 18px;

    padding: 4px;
}

.password-toggle:hover {
    color: var(--cyan);
}


/* OPTIONS */

.options {
    display: flex;

    align-items: center;

    justify-content: space-between;

    margin: 5px 0 20px;

    font-size: 11px;
}

.remember {
    display: flex;

    align-items: center;

    gap: 7px;

    color: #64818a;

    cursor: pointer;
}

.remember input {
    accent-color: var(--cyan);
}

.forgot {
    color: var(--cyan);

    text-decoration: none;

    cursor: pointer;
}

.forgot:hover {
    text-decoration: underline;
}


/* LOGIN BUTTON */

.login-button {
    width: 100%;

    height: 50px;

    display: flex;

    align-items: center;

    justify-content: center;

    gap: 9px;

    border: none;

    border-radius: 12px;

    background:
        linear-gradient(
            135deg,
            #00e5ff,
            #00aaff
        );

    color: #001014;

    font-size: 13px;

    font-weight: 900;

    letter-spacing: 1px;

    cursor: pointer;

    box-shadow:
        0 8px 25px
        rgba(0,229,255,0.15);

    transition: 0.25s ease;
}

.login-button:hover {
    transform: translateY(-2px);

    box-shadow:
        0 12px 35px
        rgba(0,229,255,0.28);
}

.login-button:active {
    transform: scale(0.98);
}


/* DIVIDER */

.divider {
    display: flex;

    align-items: center;

    gap: 12px;

    margin: 23px 0;

    color: #3f5a62;

    font-size: 10px;

    text-transform: uppercase;

    letter-spacing: 1px;
}

.divider::before,
.divider::after {
    content: "";

    height: 1px;

    flex: 1;

    background:
        rgba(0,229,255,0.1);
}


/* CREATE ACCOUNT */

.create-account {
    text-align: center;

    color: #64818a;

    font-size: 12px;
}

.create-account a {
    color: var(--cyan);

    text-decoration: none;

    font-weight: 700;

    cursor: pointer;
}

.create-account a:hover {
    text-decoration: underline;
}


/* SECURITY */

.security {
    display: flex;

    align-items: center;

    justify-content: center;

    gap: 6px;

    margin-top: 20px;

    color: #45616a;

    font-size: 9px;

    letter-spacing: 1px;

    text-transform: uppercase;
}

.security iconify-icon {
    color: var(--cyan);

    font-size: 14px;
}


/* BACKGROUND BUTTON */

.background-button {
    display: flex;

    align-items: center;

    justify-content: center;

    gap: 7px;

    width: fit-content;

    margin: 18px auto 0;

    padding: 9px 14px;

    border-radius: 10px;

    color: #64818a;

    background:
        rgba(0,229,255,0.03);

    border:
        1px solid
        rgba(0,229,255,0.1);

    font-size: 10px;

    font-weight: 700;

    cursor: pointer;

    transition: 0.25s ease;
}

.background-button:hover {
    color: var(--cyan);

    border-color:
        rgba(0,229,255,0.35);
}

#backgroundInput {
    display: none;
}


/* MOBILE */

@media (max-width: 500px) {

    body {
        padding: 15px;
    }

    .login-card {
        padding: 25px 20px;
    }

    .brand h1 {
        font-size: 25px;
    }

    .logo {
        width: 62px;
        height: 62px;
    }

}

</style>
</head>


<body>


<div id="backgroundOverlay"></div>

<div id="backgroundDark"></div>

<div class="glow one"></div>

<div class="glow two"></div>


<div class="login-wrapper">


    <!-- LOGO -->

    <div class="brand">

        <div class="logo">

            <iconify-icon
                icon="lucide:bitcoin">
            </iconify-icon>

        </div>

        <h1>CYBER VAULT</h1>

        <p>
            Secure Digital Collection
        </p>

    </div>


    <!-- LOGIN -->

    <div class="login-card">


        <div class="card-header">

            <h2>
                Welcome Back
            </h2>

            <p>
                Log in to access your vault
            </p>

        </div>


        <!-- ERROR -->

        <div
            class="status"
            id="statusMessage">

            Please enter your username
            and password.

        </div>


        <!-- USERNAME -->

        <div class="input-group">

            <label class="input-label">

                Username

            </label>

            <div class="input-wrapper">

                <iconify-icon
                    class="input-icon"
                    icon="lucide:user">
                </iconify-icon>

                <input
                    type="text"
                    id="username"
                    placeholder="Enter your username"
                    autocomplete="username">

            </div>

        </div>


        <!-- PASSWORD -->

        <div class="input-group">

            <label class="input-label">

                Password

            </label>

            <div class="input-wrapper">

                <iconify-icon
                    class="input-icon"
                    icon="lucide:lock">
                </iconify-icon>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    autocomplete="current-password">

                <button
                    class="password-toggle"
                    type="button"
                    onclick="togglePassword()">

                    <iconify-icon
                        id="eyeIcon"
                        icon="lucide:eye">
                    </iconify-icon>

                </button>

            </div>

        </div>


        <!-- OPTIONS -->

        <div class="options">

            <label class="remember">

                <input
                    type="checkbox"
                    id="rememberMe">

                Remember me

            </label>


            <a
                href="#"
                class="forgot"
                onclick="forgotPassword(event)">

                Forgot password?

            </a>

        </div>


        <!-- LOGIN -->

        <button
            class="login-button"
            onclick="login()">

            <iconify-icon
                icon="lucide:log-in">
            </iconify-icon>

            ENTER VAULT

        </button>


        <!-- DIVIDER -->

        <div class="divider">

            OR

        </div>


        <!-- CREATE ACCOUNT -->

        <div class="create-account">

            Don't have an account?

            <a
                href="#"
                onclick="createAccount(event)">

                Create Account

            </a>

        </div>


        <!-- SECURITY -->

        <div class="security">

            <iconify-icon
                icon="lucide:shield-check">
            </iconify-icon>

            Secure encrypted connection

        </div>


    </div>


    <!-- BACKGROUND -->

    <label
        class="background-button"
        for="backgroundInput">

        <iconify-icon
            icon="lucide:image">
        </iconify-icon>

        Choose Custom Background

    </label>


    <input
        type="file"
        id="backgroundInput"
        accept="image/*">


</div>


<script>


/* =========================
   LOGIN
========================= */

function login() {

    const username =
        document
        .getElementById("username")
        .value
        .trim();


    const password =
        document
        .getElementById("password")
        .value
        .trim();


    const status =
        document
        .getElementById("statusMessage");


    /* CHECK EMPTY FIELDS */

    if (!username || !password) {

        status.style.display =
            "block";

        status.textContent =
            "Please enter your username and password.";

        return;

    }


    /* SAVE USERNAME */

    const remember =
        document
        .getElementById("rememberMe")
        .checked;


    if (remember) {

        localStorage.setItem(
            "vaultUsername",
            username
        );

    }


    /*
    LOGIN SUCCESS

    This sends the user
    directly to your vault.

    Make sure your main website
    is named:

    vault.html
    */


    window.location.href =
        "vault.html";

}


/* =========================
   CREATE ACCOUNT
========================= */

function createAccount(event) {

    event.preventDefault();


    /*
    Since there is no account
    system connected yet, this
    simply takes the user to
    the vault.

    Anyone can access the vault
    without requesting access.
    */


    window.location.href =
        "vault.html";

}


/* =========================
   FORGOT PASSWORD
========================= */

function forgotPassword(event) {

    event.preventDefault();


    alert(
        "Password recovery is not connected yet."
    );

}


/* =========================
   SHOW PASSWORD
========================= */

function togglePassword() {

    const password =
        document
        .getElementById("password");


    const icon =
        document
        .getElementById("eyeIcon");


    if (
        password.type ===
        "password"
    ) {

        password.type =
            "text";


        icon.setAttribute(
            "icon",
            "lucide:eye-off"
        );

    }

    else {

        password.type =
            "password";


        icon.setAttribute(
            "icon",
            "lucide:eye"
        );

    }

}


/* =========================
   ENTER KEY
========================= */

document.addEventListener(
    "keydown",
    function(event) {

        if (
            event.key ===
            "Enter"
        ) {

            login();

        }

    }
);


/* =========================
   BACKGROUND IMAGE
========================= */

const backgroundInput =
    document
    .getElementById(
        "backgroundInput"
    );


const backgroundOverlay =
    document
    .getElementById(
        "backgroundOverlay"
    );


backgroundInput.addEventListener(
    "change",
    function(event) {

        const file =
            event.target.files[0];


        if (!file) {

            return;

        }


        if (
            !file.type.startsWith(
                "image/"
            )
        ) {

            alert(
                "Please select an image."
            );

            return;

        }


        const reader =
            new FileReader();


        reader.onload =
            function(e) {

                const image =
                    e.target.result;


                backgroundOverlay.style
                    .backgroundImage =
                    "url('" +
                    image +
                    "')";


                backgroundOverlay.classList
                    .add("active");


                localStorage.setItem(
                    "loginBackground",
                    image
                );

            };


        reader.readAsDataURL(
            file
        );

    }
);


/* =========================
   LOAD SAVED BACKGROUND
========================= */

window.addEventListener(
    "load",
    function() {


        const savedBackground =
            localStorage.getItem(
                "loginBackground"
            );


        if (
            savedBackground
        ) {

            backgroundOverlay.style
                .backgroundImage =
                "url('" +
                savedBackground +
                "')";


            backgroundOverlay.classList
                .add("active");

        }


        /* REMEMBER USERNAME */

        const savedUsername =
            localStorage.getItem(
                "vaultUsername"
            );


        if (
            savedUsername
        ) {

            document
            .getElementById(
                "username"
            )
            .value =
                savedUsername;


            document
            .getElementById(
                "rememberMe"
            )
            .checked =
                true;

        }

    }
);


</script>

</body>
</html>
