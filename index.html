<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Every Link You Could Need</title>

<style>

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html,
body {
  width: 100%;
  min-height: 100%;
  background: #000;
}

body {
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;

  color: var(--text);

  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    Arial,
    sans-serif;

  padding: 0 15px 50px;

  overflow-x: hidden;
}

/* =========================================
   FULL SCREEN BACKGROUND
========================================= */

#backgroundLayer {

  position: fixed;

  z-index: -10;

  top: 0;
  left: 0;

  width: 100vw;

  height: 100vh;
  height: 100dvh;

  background:
    radial-gradient(
      circle at top,
      var(--bg-glow),
      var(--bg-mid) 45%,
      var(--bg-main) 100%
    );

  background-size: cover;

  background-position: center;

  background-repeat: no-repeat;
}

#backgroundOverlay {

  position: fixed;

  z-index: -9;

  top: 0;
  left: 0;

  width: 100vw;

  height: 100vh;
  height: 100dvh;

  background: transparent;

  pointer-events: none;
}

/* =========================================
   THEMES
========================================= */

body.theme-cyan {

  --bg-main: #000000;
  --bg-mid: #020b0b;
  --bg-glow: #003333;

  --accent: #00ffff;

  --accent-soft:
    rgba(0, 255, 255, 0.15);

  --border:
    rgba(0, 255, 255, 0.45);

  --card: #050505;

  --button: #080808;

  --text: #ffffff;

  --muted: #6f9999;
}

body.theme-red {

  --bg-main: #000000;
  --bg-mid: #0b0202;
  --bg-glow: #330000;

  --accent: #ff1744;

  --accent-soft:
    rgba(255, 23, 68, 0.15);

  --border:
    rgba(255, 23, 68, 0.45);

  --card: #050000;

  --button: #080000;

  --text: #ffffff;

  --muted: #996f6f;
}

body.theme-purple {

  --bg-main: #000000;
  --bg-mid: #08020b;
  --bg-glow: #260033;

  --accent: #c000ff;

  --accent-soft:
    rgba(192, 0, 255, 0.15);

  --border:
    rgba(192, 0, 255, 0.45);

  --card: #050005;

  --button: #080008;

  --text: #ffffff;

  --muted: #956f99;
}

body.theme-green {

  --bg-main: #000000;
  --bg-mid: #020b04;
  --bg-glow: #003315;

  --accent: #00ff66;

  --accent-soft:
    rgba(0, 255, 102, 0.15);

  --border:
    rgba(0, 255, 102, 0.45);

  --card: #000500;

  --button: #000800;

  --text: #ffffff;

  --muted: #6f997d;
}

body.theme-yellow {

  --bg-main: #000000;
  --bg-mid: #0b0b02;
  --bg-glow: #333300;

  --accent: #ffff00;

  --accent-soft:
    rgba(255, 255, 0, 0.15);

  --border:
    rgba(255, 255, 0, 0.45);

  --card: #050500;

  --button: #080800;

  --text: #ffffff;

  --muted: #99996f;
}

body.theme-white {

  --bg-main: #ffffff;
  --bg-mid: #eeeeee;
  --bg-glow: #ffffff;

  --accent: #000000;

  --accent-soft:
    rgba(0, 0, 0, 0.08);

  --border:
    rgba(0, 0, 0, 0.3);

  --card: #ffffff;

  --button: #f2f2f2;

  --text: #000000;

  --muted: #666666;
}

/* =========================================
   THEME MENU
========================================= */

.theme-menu {

  width: 100%;

  max-width: 900px;

  margin: 12px auto;

  display: flex;

  justify-content: center;

  gap: 6px;

  flex-wrap: wrap;
}

.theme-button,
.custom-button,
.remove-background {

  padding:
    7px 11px;

  border-radius:
    20px;

  background:
    var(--button);

  color:
    var(--text);

  border:
    1px solid var(--border);

  font-size:
    10px;

  font-weight:
    800;

  cursor:
    pointer;

  transition:
    0.2s;
}

.theme-button:hover,
.custom-button:hover,
.remove-background:hover {

  color:
    var(--accent);

  border-color:
    var(--accent);

  box-shadow:
    0 0 10px var(--accent-soft);
}

#backgroundInput {

  display:
    none;
}

.remove-background {

  display:
    none;
}

/* =========================================
   HEADER
========================================= */

.header {

  text-align:
    center;

  padding:
    30px 20px 20px;

  margin-bottom:
    15px;
}

.header h1 {

  font-size:
    32px;

  font-weight:
    900;

  line-height:
    1.1;

  text-transform:
    uppercase;

  letter-spacing:
    -1px;

  color:
    var(--accent);

  text-shadow:
    0 0 15px var(--accent-soft);
}

/* =========================================
   CATEGORY BUTTONS
========================================= */

.buttons-container {

  width:
    100%;

  max-width:
    900px;

  margin:
    0 auto 15px;

  display:
    grid;

  grid-template-columns:
    repeat(3, 1fr);

  gap:
    10px;

  padding:
    0 5px;
}

.btn {

  padding:
    12px 8px;

  border-radius:
    9999px;

  border:
    1px solid var(--border);

  background:
    rgba(0, 0, 0, 0.75);

  color:
    var(--text);

  font-size:
    11px;

  font-weight:
    800;

  text-align:
    center;

  cursor:
    pointer;

  transition:
    all 0.2s ease;

  text-transform:
    uppercase;

  letter-spacing:
    0.3px;
}

.btn:hover,
.btn.active {

  background:
    var(--accent);

  color:
    var(--bg-main);

  border-color:
    var(--accent);

  transform:
    scale(1.03);

  box-shadow:
    0 0 15px var(--accent-soft);
}

/* =========================================
   SEARCH BAR
========================================= */

.search-bar {

  display:
    block;

  width:
    90%;

  max-width:
    500px;

  margin:
    15px auto 20px;

  padding:
    13px 20px;

  border-radius:
    9999px;

  border:
    1px solid var(--border);

  background:
    rgba(0, 0, 0, 0.9);

  color:
    var(--text);

  font-size:
    14px;

  text-align:
    center;

  outline:
    none;

  box-shadow:
    0 0 20px var(--accent-soft);
}

.search-bar:focus {

  border-color:
    var(--accent);

  box-shadow:
    0 0 20px var(--accent-soft);
}

.search-bar::placeholder {

  color:
    var(--muted);
}

/* =========================================
   LINK CARDS
========================================= */

.container {

  width:
    100%;

  max-width:
    900px;

  margin:
    0 auto;
}

.grid {

  display:
    grid;

  grid-template-columns:
    repeat(3, 1fr);

  gap: 15px;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.image-area {
  position: relative;
  background: rgba(255,255,255,0.05);
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hot {
  position: absolute;
  top: 10px;
  left: 10px;
  background: #ff1744;
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  padding: 2px 6px;
  border-radius: 4px;
}

.link-icon {
  font-size: 36px;
  font-weight: bold;
  color: var(--accent);
}

.info {
  padding: 15px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.title {
  font-size: 18px;
  font-weight: bold;
}

.url {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.buttons {
  display: flex;
  gap: 8px;
}

.favorite, .view-more {
  flex: 1;
  padding: 8px;
  font-size: 12px;
  font-weight: bold;
  text-align: center;
  border-radius: 6px;
  cursor: pointer;
  text-decoration: none;
}

.favorite {
  background: var(--button);
  color: var(--text);
  border: 1px solid var(--border);
}

.view-more {
  background: var(--accent);
  color: var(--bg-main);
  border: none;
}

</style>
</head>
<body class="theme-cyan">

<div id="backgroundLayer"></div>
<div id="backgroundOverlay"></div>

<div class="header">
  <h1>Every Link You Could Need</h1>
</div>

<div class="container">
  <div class="grid">
    
    <!-- LINK 8 - RIO / MOVIES -->
    <div class="card" data-category="movies">
      <div class="image-area">
        <div class="hot">HOT</div>
        <div class="link-icon">8</div>
      </div>
      <div class="info">
        <div class="title">Rio</div>
        <div class="url">https://drive.google.com/file/d/1DIHKkPm7JVwOWWgM5RvYgOhAbFXWOAhf/view</div>
        <div class="buttons">
          <button class="favorite" onclick="toggleFavorite(this)">
            <span class="heart">♡</span> Add to favorites
          </button>
          <a class="view-more" href="https://drive.google.com/file/d/1DIHKkPm7JVwOWWgM5RvYgOhAbFXWOAhf/view" target="_blank" rel="noopener noreferrer">
            View more
          </a>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
function toggleFavorite(button) {
  const heart = button.querySelector('.heart');
  if (heart.innerText === '♡') {
    heart.innerText = '♥';
    button.style.color = 'var(--accent)';
  } else {
    heart.innerText = '♡';
    button.style.color = 'var(--text)';
  }
}
</script>

</body>
</html>
