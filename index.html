<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>

    <!-- STEP 1: Iconify Script Integration -->
    <script src="https://iconify.design"></script>

    <!-- Basic styling to create a clean, dark layout -->
    <style>
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 24px;
        }

        /* Search Bar Wrapper Styling */
        .search-container {
            display: flex;
            align-items: center;
            background-color: #1f2833;
            border: 1px solid #45a29e;
            border-radius: 25px;
            padding: 10px 15px;
            margin-bottom: 20px;
        }

        .search-container input {
            background: none;
            border: none;
            color: white;
            outline: none;
            margin-left: 10px;
            width: 100%;
            font-size: 16px;
        }

        /* Action Button Styling */
        .fav-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background-color: #c5a059;
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Website</h1>

        <!-- Example 1: Search Bar with Iconify Search Icon -->
        <div class="search-container">
            <iconify-icon icon="lucide:search" style="font-size: 20px; color: #45a29e;"></iconify-icon>
            <input type="text" placeholder="Search products...">
        </div>

        <!-- Example 2: Interactive Button with Iconify Heart Icon -->
        <button class="fav-button">
            <iconify-icon icon="lucide:heart" style="font-size: 20px;"></iconify-icon>
            Add to favorites
        </button>
    </div>

</body>
</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Grid</title>
    <style>
        body {
            background-color: #0b0101;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 500px;
            width: 100%;
        }

        .product-card {
            background-color: #120505;
            border: 1px solid #3a0d0d;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-sizing: border-box;
        }

        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(90deg, #ff4d6d, #ff758f);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 12px;
            text-transform: uppercase;
        }

        .product-image {
            width: 100%;
            height: auto;
            max-height: 140px;
            object-fit: contain;
            margin-bottom: 12px;
        }

        .product-title {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            margin: 0 0 6px 0;
            line-height: 1.3;
        }

        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .btn-fav {
            background-color: #1c0b0b;
            border: 1px solid #3a1515;
            color: #b3b3b3;
            width: 100%;
            padding: 8px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-view {
            background-color: #ffffff;
            color: #000000;
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-view:hover {
            background-color: #e6e6e6;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        
        <!-- Card 1 (Link Added Here) -->
        <div class="product-card">
            <img class="product-image" src="polo-sweaters.png" alt="Polo Sweaters">
            <h3 class="product-title">Polo Sweaters (+14 color options)</h3>
            <div class="product-price">$11.70</div>
            <button class="btn-fav">♡ Add to favorites</button>
            <!-- Your Google Drive Link -->
            <a class="btn-view" href="https://drive.google.com/file/d/1AIq4OqiMWiY9zZSayF5VID7pfTwSH6BM/view" target="_blank">View more</a>
        </div>

        <!-- Card 2 -->
        <div class="product-card">
            <span class="badge">Hot</span>
            <img class="product-image" src="essentials-set.png" alt="Essentials Set">
            <h3 class="product-title">Essentials Set (+24 options)</h3>
            <div class="product-price">$13.43</div>
            <button class="btn-fav">♡ Add to favorites</button>
            <a class="btn-view" href="#">View more</a>
        </div>

    </div>

</body>
</html>
