<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Bug's Life</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #020608;
            color: #eaffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: #071116;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(0, 229, 255, 0.18);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            max-width: 400px;
            width: 90%;
        }

        .poster-frame {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
            background-color: #0b1920;
            aspect-ratio: 2 / 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .poster-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            font-size: 28px;
            margin: 20px 0 10px;
            letter-spacing: 1px;
            color: #00e5ff;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        p {
            color: #7899a3;
            font-size: 14px;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="poster-frame">
            <!-- The poster image element points directly to your file name -->
            <img src="bugs-life.jpg" alt="A Bug's Life Poster">
        </div>
        <h1>A Bug's Life</h1>
        <p>1998 • Animation • 1h 35m</p>
    </div>

</body>
</html>
