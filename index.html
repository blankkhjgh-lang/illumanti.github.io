<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ILLUMINATI MOVIES</title>

    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #0b0101;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            width: 100%;
            padding: 25px 20px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin: 0 0 20px;
        }

        /* NAVIGATION */
        .nav-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .dropdown {
            position: relative;
        }

        .dropdown-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #120505;
            border: 1px solid #3a0d0d;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dropdown-btn:hover {
            background: #241010;
            border-color: #ff4d6d;
            transform: translateY(-2px);
        }

        .arrow {
            transition: transform 0.3s ease;
        }

        .dropdown.active .arrow {
            transform: rotate(180deg);
        }

        /* DROPDOWN MENU */
        .dropdown-menu {
            position: absolute;
            top: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%) translateY(-10px);
            width: 200px;
            background: #120505;
            border: 1px solid #3a0d0d;
            border-radius: 16px;
            padding: 8px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 100;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .dropdown.active .dropdown-menu {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .category {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 11px 12px;
            color: #cccccc;
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .category:hover {
            background: #2a0d0d;
            color: #ffffff;
            padding-left: 17px;
        }

        .category iconify-icon {
            color: #ff4d6d;
            font-size: 17px;
        }

        /* SEARCH */
        .search-container {
            display: flex;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
            background: #120505;
            border: 1px solid #3a0d0d;
            border-radius: 25px;
            padding: 11px 15px;
        }

        .search-container input {
            background: none;
            border: none;
            color: white;
            outline: none;
            margin-left: 10px;
            width: 100%;
            font-size: 16px;
        }

        .search-container input::placeholder {
            color: #777;
        }

        /* CONTENT */
        .content {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px 40px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            margin: 20px 0;
        }

        .section-title iconify-icon {
            color: #ff4d6d;
        }

        /* PRODUCT GRID */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px; /* Reduced gap */
        }

        .product-card {
            background: #120505;
            border: 1px solid #3a0d0d;
            border-radius: 16px;
            padding: 6px; /* Smaller padding */
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
            max-width: 100%;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: #ff4d6d;
        }

        .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: linear-gradient(90deg, #ff4d6d, #ff758f);
            color: white;
            font-size: 9px;
            font-weight: bold;
            padding: 3px 7px;
            border-radius: 10px;
            text-transform: uppercase;
        }

        .product-image {
            width: 100%;
            height: 110px; /* 50% smaller than 220px */
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #1a0a0a;
        }

        .product-title {
            font-size: 12px; /* Smaller text */
            font-weight: 600;
            text-align: center;
            margin: 0 0 8px;
            line-height: 1.3;
        }

        .btn-fav {
            background: #1c0b0b;
            border: 1px solid #3a1515;
            color: #b3b3b3;
            width: 100%;
            padding: 6px;
            border-radius: 20px;
            font-size: 10px;
            cursor: pointer;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .btn-view {
            background: white;
            color: black;
            width: 100%;
            padding: 7px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
        }

        /* REPS SECTION */
        #reps-section {
            display: none;
        }

        .empty-message {
            background: #120505;
            border: 1px solid #3a0d0d;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            color: #888;
        }

        /* MOBILE */
        @media (max-width: 500px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <div class="header">
        <h1>ILLUMINATI MOVIES</h1>

        <!-- NAVIGATION -->
        <div class="nav-container">

            <!-- MOVIES DROPDOWN -->
            <div class="dropdown" id="moviesDropdown">

                <button class="dropdown-btn" onclick="toggleDropdown('moviesDropdown')">
                    <iconify-icon icon="lucide:film"></iconify-icon>
                    Movies
                    <iconify-icon class="arrow" icon="lucide:chevron-down"></iconify-icon>
                </button>

                <div class="dropdown-menu">

                    <button class="category" onclick="showSection('movies-section')">
                        <iconify-icon icon="lucide:layout-grid"></iconify-icon>
                        All Movies
                    </button>

                    <button class="category" onclick="showSection('movies-section')">
                        <iconify-icon icon="lucide:star"></iconify-icon>
                        Popular
                    </button>

                    <button class="category" onclick="showSection('movies-section')">
                        <iconify-icon icon="lucide:flame"></iconify-icon>
                        Trending
                    </button>

                    <button class="category" onclick="showSection('movies-section')">
                        <iconify-icon icon="lucide:heart"></iconify-icon>
                        Favorites
                    </button>

                </div>
            </div>


            <!-- REPS DROPDOWN -->
            <div class="dropdown" id="repsDropdown">

                <button class="dropdown-btn" onclick="toggleDropdown('repsDropdown')">
                    <iconify-icon icon="lucide:shopping-bag"></iconify-icon>
                    Reps
                    <iconify-icon class="arrow" icon="lucide:chevron-down"></iconify-icon>
                </button>

                <div class="dropdown-menu">

                    <button class="category" onclick="showSection('reps-section')">
                        <iconify-icon icon="lucide:layout-grid"></iconify-icon>
                        All Reps
                    </button>

                    <button class="category" onclick="showSection('reps-section')">
                        <iconify-icon icon="lucide:shirt"></iconify-icon>
                        Clothing
                    </button>

                    <button class="category" onclick="showSection('reps-section')">
                        <iconify-icon icon="lucide:footprints"></iconify-icon>
                        Shoes
                    </button>

                    <button class="category" onclick="showSection('reps-section')">
                        <iconify-icon icon="lucide:watch"></iconify-icon>
                        Accessories
                    </button>

                </div>
            </div>

        </div>

        <!-- SEARCH -->
        <div class="search-container">
            <iconify-icon 
                icon="lucide:search" 
                style="font-size: 20px; color: #ff4d6d;">
            </iconify-icon>

            <input 
                type="text" 
                id="searchInput"
                placeholder="Search movies..."
                onkeyup="searchProducts()">
        </div>

    </div>


    <!-- CONTENT -->
    <div class="content">

        <!-- MOVIES -->
        <section id="movies-section">

            <h2 class="section-title">
                <iconify-icon icon="lucide:film"></iconify-icon>
                Movies
            </h2>

            <div class="grid-container">

                <!-- BUGS LIFE -->
                <div class="product-card">
                    <img 
                        class="product-image" 
                        src="https://upload.wikimedia.org/wikipedia/en/7/7f/A_Bug%27s_Life.jpg" 
                        alt="A Bug's Life">

                    <h3 class="product-title">
                        A Bug's Life
                    </h3>

                    <button class="btn-fav">
                        <iconify-icon icon="lucide:heart"></iconify-icon>
                        Add to favorites
                    </button>

                    <a 
                        class="btn-view" 
                        href="https://drive.google.com/file/d/1AIq4OqiMWiY9zZSayF5VID7pfTwSH6BM/view" 
                        target="_blank">
                        View more
                    </a>
                </div>


                <!-- CHARLIE BROWN CHRISTMAS -->
                <div class="product-card">
                    <span class="badge">Hot</span>

                    <img 
                        class="product-image" 
                        src="https://upload.wikimedia.org/wikipedia/en/1/1f/A_Charlie_Brown_Christmas_poster.jpg" 
                        alt="A Charlie Brown Christmas">

                    <h3 class="product-title">
                        A Charlie Brown Christmas
                    </h3>

                    <button class="btn-fav">
                        <iconify-icon icon="lucide:heart"></iconify-icon>
                        Add to favorites
                    </button>

                    <a 
                        class="btn-view" 
                        href="https://drive.google.com/file/d/1e2UIrJdsz_0k5tp2v0EnPZiPv2ZQSTzg/view" 
                        target="_blank">
                        View more
                    </a>
                </div>


                <!-- A GOOFY MOVIE -->
                <div class="product-card">

                    <img 
                        class="product-image" 
                        src="https://upload.wikimedia.org/wikipedia/en/4/4f/A_Goofy_Movie_poster.jpg" 
                        alt="A Goofy Movie">

                    <h3 class="product-title">
                        A Goofy Movie
                    </h3>

                    <button class="btn-fav">
                        <iconify-icon icon="lucide:heart"></iconify-icon>
                        Add to favorites
                    </button>

                    <a 
                        class="btn-view" 
                        href="https://drive.google.com/file/d/1ify_EMaQW-ZAn2FOSTztn2AGU-jE7aHL/view" 
                        target="_blank">
                        View more
                    </a>
                </div>


                <!-- ANT-MAN -->
                <div class="product-card">

                    <img 
                        class="product-image" 
                        src="https://upload.wikimedia.org/wikipedia/en/0/0c/Ant-Man_and_the_Wasp_Quantumania_poster.jpg" 
                        alt="Ant-Man and the Wasp Quantumania">

                    <h3 class="product-title">
                        Ant-Man and the Wasp: Quantumania
                    </h3>

                    <button class="btn-fav">
                        <iconify-icon icon="lucide:heart"></iconify-icon>
                        Add to favorites
                    </button>

                    <a 
                        class="btn-view" 
                        href="https://drive.google.com/file/d/1AW3Zm8256tzZ-37lmgYmlGse4knu8dA/view" 
                        target="_blank">
                        View more
                    </a>
                </div>

            </div>
        </section>


        <!-- REPS -->
        <section id="reps-section">

            <h2 class="section-title">
                <iconify-icon icon="lucide:shopping-bag"></iconify-icon>
                Reps
            </h2>

            <div class="empty-message">
                <iconify-icon 
                    icon="lucide:package-open" 
                    style="font-size: 40px; color: #ff4d6d;">
                </iconify-icon>

                <p>No reps added yet.</p>
            </div>

        </section>

    </div>


    <script>

        /* DROPDOWN ANIMATION */

        function toggleDropdown(id) {

            const dropdown = document.getElementById(id);

            document.querySelectorAll('.dropdown').forEach(function(item) {

                if (item !== dropdown) {
                    item.classList.remove('active');
                }

            });

            dropdown.classList.toggle('active');
        }


        /* CLOSE DROPDOWNS WHEN CLICKING OUTSIDE */

        document.addEventListener('click', function(event) {

            if (!event.target.closest('.dropdown')) {

                document.querySelectorAll('.dropdown').forEach(function(dropdown) {
                    dropdown.classList.remove('active');
                });

            }

        });


        /* SWITCH BETWEEN MOVIES AND REPS */

        function showSection(sectionId) {

            document.getElementById('movies-section').style.display = 'none';
            document.getElementById('reps-section').style.display = 'none';

            document.getElementById(sectionId).style.display = 'block';

            document.querySelectorAll('.dropdown').forEach(function(dropdown) {
                dropdown.classList.remove('active');
            });

        }


        /* SEARCH PRODUCTS */

        function searchProducts() {

            const searchValue =
                document.getElementById('searchInput')
                .value
                .toLowerCase();

            const cards =
                document.querySelectorAll('.product-card');

            cards.forEach(function(card) {

                const title =
                    card.querySelector('.product-title');

                if (title) {

                    const productName =
                        title.textContent.toLowerCase();

                    if (productName.includes(searchValue)) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }

                }

            });

        }

    </script>

</body>
</html>
