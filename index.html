<title>Every Link You Could Need</title>

<style>

* {
 box-sizing: border-box;
 margin: 0;
 padding: 0;
}

html,
body {
 width: 100%;
 min-height: 100%;
 background: #000;
}

body {
 width: 100%;
 min-height: 100vh;
 min-height: 100dvh;

 color: var(--text);

 font-family:
 -apple-system,
 BlinkMacSystemFont,
 "Segoe UI",
 Roboto,
 Arial,
 sans-serif;

 padding: 0 15px 50px;

 overflow-x: hidden;
}


/* =========================================
 FULL SCREEN BACKGROUND
========================================= */

#backgroundLayer {

 position: fixed;

 z-index: -10;

 top: 0;
 left: 0;

 width: 100vw;

 height: 100vh;
 height: 100dvh;

 background:
 radial-gradient(
 circle at top,
 var(--bg-glow),
 var(--bg-mid) 45%,
 var(--bg-main) 100%
 );

 background-size: cover;

 background-position: center;

 background-repeat: no-repeat;
}


#backgroundOverlay {

 position: fixed;

 z-index: -9;

 top: 0;
 left: 0;

 width: 100vw;

 height: 100vh;
 height: 100dvh;

 background: transparent;

 pointer-events: none;
}
