<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Every Link You Could Need</title>
<style>
/* ... (your existing styles here) ... */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
html,
body {
  width: 100%;
  min-height: 100%;
  background: #000;
}
body {
  width: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
  padding: 0 15px 50px;
  overflow-x: hidden;
}
/* ... (rest of your existing styles) ... */

</style>
</head>
<body class="theme-cyan">
<!-- FULL SCREEN BACKGROUND -->
<div id="backgroundLayer"></div>
<div id="backgroundOverlay"></div>
<!-- THEME MENU -->
<div class="theme-menu">
  <button class="theme-button" onclick="setTheme('cyan')">Cyan</button>
  <button class="theme-button" onclick="setTheme('red')">Red</button>
  <button class="theme-button" onclick="setTheme('purple')">Purple</button>
  <button class="theme-button" onclick="setTheme('green')">Green</button>
  <button class="theme-button" onclick="setTheme('yellow')">Yellow</button>
  <button class="theme-button" onclick="setTheme('white')">White</button>
  <label class="custom-button">
    Custom Background
    <input type="file" id="backgroundInput" accept="image/*" onchange="setCustomBackground(event)" />
  </label>
  <button class="remove-background" id="removeBackground" onclick="removeCustomBackground()">Remove Background</button>
</div>
<!-- HEADER -->
<div class="header">
  <h1>Every Link You Could Need</h1>
</div>
<!-- CATEGORY BUTTONS -->
<div class="buttons-container">
  <div class="btn active" data-category="scamming">Scamming</div>
  <div class="btn" data-category="movies">Movies</div>
  <div class="btn" data-category="clothes">Clothes</div>
  <div class="btn" data-category="followers-likes">Followers/Likes</div>
  <div class="btn" data-category="blank2">Blank 2</div>
  <div class="btn" data-category="blank3">Blank 3</div>
  <div class="btn" data-category="blank4">Blank 4</div>
  <div class="btn" data-category="blank5">Blank 5</div>
  <div class="btn" data-category="blank6">Blank 6</div>
  <div class="btn" data-category="blank7">Blank 7</div>
</div>
<!-- SEARCH BAR -->
<input type="text" class="search-bar" placeholder="Search links..." id="searchBar" />
<!-- LINK CARDS -->
<div class="container">
  <div class="grid">
    <!-- Your existing links here -->
    <!-- Example: -->
    <!-- Link 7 - RIO / MOVIES -->
    <div class="card" data-category="movies">
      <div class="image-area">
        <div class="hot">HOT</div>
        <div class="link-icon">7</div>
      </div>
      <div class="info">
        <div class="title">Rio</div>
        <div class="url">
          https://drive.google.com/file/d/1DIHKkPm7JVwOWWgM5RvYgOhAbFXWOAhf/view
        </div>
        <div class="buttons">
          <button class="favorite" onclick="toggleFavorite(this)">
            <span class="heart">♡</span>
            Add to favorites
          </button>
          <a class="view-more" href="https://drive.google.com/file/d/1DIHKkPm7JVwOWWgM5RvYgOhAbFXWOAhf/view" target="_blank" rel="noopener noreferrer">
            View more
          </a>
        </div>
      </div>
    </div>
    <!-- Add more links as needed -->
  </div>
</div>
<script>
/* Your existing JavaScript functions here */

function setTheme(theme) {
  document.body.classList.remove(
    "theme-cyan","theme-red","theme-purple","theme-green","theme-yellow","theme-white"
  );
  document.body.classList.add("theme-" + theme);
  localStorage.setItem("selectedTheme", theme);
}

function setCustomBackground(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const image = e.target.result;
    const bg = document.getElementById("backgroundLayer");
    const overlay = document.getElementById("backgroundOverlay");
    bg.style.backgroundImage = "url('" + image + "')";
    bg.style.backgroundSize = "cover";
    bg.style.backgroundPosition = "center center";
    bg.style.backgroundRepeat = "no-repeat";
    overlay.style.background = "rgba(0,0,0,0.45)";
    localStorage.setItem("customBackground", image);
    document.getElementById("removeBackground").style.display = "block";
  };
  reader.readAsDataURL(file);
}

function removeCustomBackground() {
  const bg = document.getElementById("backgroundLayer");
  const overlay = document.getElementById("backgroundOverlay");
  bg.style.backgroundImage = "";
  overlay.style.background = "transparent";
  localStorage.removeItem("customBackground");
  document.getElementById("removeBackground").style.display = "none";
}

function toggleFavorite(button) {
  const heart = button.querySelector(".heart");
  if (heart.textContent === "♡") {
    heart.textContent = "♥";
    button.style.background = "var(--accent-soft)";
    button.style.borderColor = "var(--accent)";
    button.style.color = "var(--accent)";
  } else {
    heart.textContent = "♡";
    button.style.background = "var(--button)";
    button.style.borderColor = "var(--border)";
    button.style.color = "var(--text)";
  }
}

const categoryButtons = document.querySelectorAll(".btn");
const cards = document.querySelectorAll(".card");
categoryButtons.forEach(function(button) {
  button.addEventListener("click", function() {
    categoryButtons.forEach(function(btn) {
      btn.classList.remove("active");
    });
    button.classList.add("active");
    const category = button.dataset.category;
    cards.forEach(function(card) {
      if (card.dataset.category === category) {
        card.style.display = "block";
      } else {
        card.style.display = "none";
      }
    });
  });
});

const searchBar = document.getElementById("searchBar");
searchBar.addEventListener("input", function() {
  const search = searchBar.value.toLowerCase().trim();
  cards.forEach(function(card) {
    const text = card.textContent.toLowerCase();
    if (text.includes(search)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
});

// Load saved theme and background on page load
window.addEventListener("load", function() {
  const savedTheme = localStorage.getItem("selectedTheme");
  if (savedTheme) {
    setTheme(savedTheme);
  }
  const savedBackground = localStorage.getItem("customBackground");
  if (savedBackground) {
    const bg = document.getElementById("backgroundLayer");
    const overlay = document.getElementById("backgroundOverlay");
    bg.style.backgroundImage = "url('" + savedBackground + "')";
    bg.style.backgroundSize = "cover";
    bg.style.backgroundPosition = "center center";
    bg.style.backgroundRepeat = "no-repeat";
    overlay.style.background = "rgba(0,0,0,0.45)";
    document.getElementById("removeBackground").style.display = "block";
  }
});
</script>
</body>
</html>
