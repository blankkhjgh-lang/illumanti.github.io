<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Product Shop</title>
    <script src="https://iconify.design"></script>
    <style>
        body {
            background-color: #0b0101;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            box-sizing: border-box;
        }
        .header-container {
            width: 100%;
            max-width: 500px;
            text-align: center;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .search-container {
            display: flex;
            align-items: center;
            background-color: #120505;
            border: 1px solid #3a0d0d;
            border-radius: 25px;
            padding: 10px 15px;
            box-sizing: border-box;
        }
        .search-container input {
            background: none;
            border: none;
            color: white;
            outline: none;
            margin-left: 10px;
            width: 100%;
            font-size: 16px;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            max-width: 500px;
            width: 100%;
        }
        .product-card {
            background-color: #120505;
            border: 1px solid #3a0d0d;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            box-sizing: border-box;
        }
        .badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(90deg, #ff4d6d, #ff758f);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 12px;
            text-transform: uppercase;
        }
        .product-image {
            width: 100%;
            height: 140px;
            object-fit: contain;
            margin-bottom: 12px;
        }
        .product-title {
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            margin: 0 0 12px 0;
            line-height: 1.3;
        }
        .product-price {
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 12px;
        }
        .btn-fav {
            background-color: #1c0b0b;
            border: 1px solid #3a1515;
            color: #b3b3b3;
            width: 100%;
            padding: 8px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-view {
            background-color: #ffffff;
            color: #000000;
            width: 100%;
            padding: 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }
        .btn-view:hover {
            background-color: #e6e6e6;
        }
        @media (max-width: 400px) {
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>Welcome to My Website</h1>
        <div class="search-container">
            <iconify-icon 
                icon="lucide:search" 
                style="font-size: 20px; color: #ff4d6d;">
            </iconify-icon>
            <input 
                type="text" 
                placeholder="Search products..."
            >
        </div>
    </div>
    <div class="grid-container">
        <!-- Box 1: Bugs Life -->
        <div class="product-card">
            <img 
                class="product-image" 
                src="polo-sweaters.png" 
                alt="Bugs Life"
            >
            <h3 class="product-title">
                Bugs Life
            </h3>
            <button class="btn-fav">
                <iconify-icon 
                    icon="lucide:heart" 
                    style="font-size: 14px;">
                </iconify-icon>
                Add to favorites
            </button>
            <a 
                class="btn-view" 
                href="https://drive.google.com/file/d/1AIq4OqiMWiY9zZSayF5VID7pfTwSH6BM/view" 
                target="_blank">
                View more
            </a>
        </div>
        <!-- Box 2: Charlie Brown Christmas -->
        <div class="product-card">
            <span class="badge">Hot</span>
            <img 
                class="product-image" 
                src="essentials-set.png" 
                alt="A Charlie Brown Christmas"
            >
            <h3 class="product-title">
                A Charlie Brown Christmas
            </h3>
            <button class="btn-fav">
                <iconify-icon 
                    icon="lucide:heart" 
                    style="font-size: 14px;">
                </iconify-icon>
                Add to favorites
            </button>
            <a 
                class="btn-view" 
                href="https://drive.google.com/file/d/1e2UIrJdsz_0k5tp2v0EnPZiPv2ZQSTzg/view" 
                target="_blank">
                View more
            </a>
        </div>
        <!-- Box 3: A Goofy Movie -->
        <div class="product-card">
            <img 
                class="product-image" 
                src="essentials-set.png" 
                alt="A Goofy Movie"
            >
            <h3 class="product-title">
                A Goofy Movie
            </h3>
            <button class="btn-fav">
                <iconify-icon 
                    icon="lucide:heart" 
                    style="font-size: 14px;">
                </iconify-icon>
                Add to favorites
            </button>
            <a 
                class="btn-view" 
                href="https://drive.google.com/file/d/1ify_EMaQW-ZAn2FOSTztn2AGU-jE7aHL/view" 
                target="_blank">
                View more
            </a>
        </div>
        <!-- Box 4: Ant-Man and the Wasp: Quantumania -->
        <div class="product-card">
            <img 
                class="product-image" 
                src="essentials-set.png" 
                alt="Ant-Man and the Wasp Quantumania"
            >
            <h3 class="product-title">
                Ant-Man and the Wasp: Quantumania
            </h3>
            <button class="btn-fav">
                <iconify-icon 
                    icon="lucide:heart" 
                    style="font-size: 14px;">
                </iconify-icon>
                Add to favorites
            </button>
            <a 
                class="btn-view" 
                href="https://drive.google.com/file/d/1AW3Zm8256tzZ-37lmgYmlGse4knu8dA/view" 
                target="_blank">
                View more
            </a>
        </div>
    </div>
</body>
</html>
